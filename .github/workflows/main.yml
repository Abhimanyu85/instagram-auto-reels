name: Auto Instagram Reels

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Pillow PySocks annotated-types beautifulsoup4 certifi charset_normalizer decorator dnspython feedparser gnews idna imageio imageio_ffmpeg instagrapi moviepy numpy proglog pycryptodomex pydantic pydantic-core requests sgmllib3k soupsieve tqdm typing-extensions typing-inspection urllib3

    - name: Install ImageMagick
      run: sudo apt-get update && sudo apt-get install -y imagemagick

    - name: Fix ImageMagick Policy
      run: |
        sudo sed -i 's/rights="none"/rights="read|write"/' /etc/ImageMagick-6/policy.xml
        sudo sed -i 's/pattern="PDF"/pattern="*"/' /etc/ImageMagick-6/policy.xml

    - name: Verify Template Image Exists
      run: |
        if [ ! -f "template.jpg" ]; then
          echo "ERROR: template.jpg is missing from the repository root!"
          exit 1
        fi

    - name: Run Automation Script
      env:
        IG_USERNAME: ${{ secrets.IG_USERNAME }}
        IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
      run: python main.py

    - name: Upload Session File
      uses: actions/upload-artifact@v4
      with:
        name: insta-session
        path: session.json
        if-no-files-found: ignore
