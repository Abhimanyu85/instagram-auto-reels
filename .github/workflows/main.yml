name: Auto Upload Instagram Reels

on:
  schedule:
    - cron: '0 5 * * *'   # 10:30 AM IST
    - cron: '30 8 * * *'  # 2:00 PM IST  
    - cron: '0 12 * * *'  # 5:30 PM IST
    - cron: '30 15 * * *' # 9:00 PM IST
    - cron: '0 18 * * *'  # 11:30 PM IST
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Code Download
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install ffmpeg -y
      - name: Install Python Packages
        run: pip install -r requirements.txt
      - name: Run Instagram Bot
        run: python insta_bot.py
        env:
          GNEWS_KEY: ${{ secrets.GNEWS_KEY }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
